name: Mutations
version: 1.0.0
main: com.plugin.mutations.MutationsPlugin
api-version: "1.21"
description: Custom mutation abilities plugin
authors: [PluginDev]
softdepend: [ProtocolLib]

commands:
  mutation:
    description: Manage player mutations
    usage: /mutation <give|withdraw|set|remove|list|info|clear|random> [player] [mutation]
    permission-message: You don't have permission to use this command.
  ability:
    description: Activate a mutation ability
    usage: /ability <1|2|3>
    permission: mutations.use
    permission-message: You don't have permission to use abilities.

  trust:
    description: Manage your trust list for mutation abilities
    usage: /trust [add|remove|list|clear] [player]
    permission: mutations.use
    permission-message: You don't have permission to use this command.

  grace:
    description: Apply a grace period to a player
    usage: /grace <duration> [player]
    permission: mutations.admin
    permission-message: You don't have permission to use this command.

  wand:
    description: Get your Ability Wand
    usage: /wand
    permission: mutations.use
    permission-message: You don't have permission to use this command.

permissions:
  mutations.admin:
    description: Allows management of mutations
    default: op
  mutations.use:
    description: Allows use of mutations
    default: true
