name: Build Plugin
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: ''
      - name: Remove corrupted JAR
        run: rm -f ~/.m2/repository/org/apache/maven/resolver/maven-resolver-connector-basic/1.9.18/maven-resolver-connector-basic-1.9.18.jar
      - run: mvn clean package
        working-directory: "mutations-plugin-1.0.1/mutations"
      - uses: actions/upload-artifact@v4
        with:
          name: Mutations-Plugin
          path: "mutations-plugin-1.0.1/mutations/target/Mutations-1.0.0.jar"
