name: Build Plugin
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: mvn clean package
        working-directory: "mutations-plugin-source (3)/mutations"
      - uses: actions/upload-artifact@v4
        with:
          name: Mutations-Plugin
          path: "mutations-plugin-source (3)/mutations/target/Mutations-1.0.0.jar"
